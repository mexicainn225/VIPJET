<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px; min-height: 100vh; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { border-radius: 14px; aspect-ratio: 1 / 1.4; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 10px; cursor: pointer; background-size: cover; background-position: center; background-color: #151822; font-size: 10px; font-weight: bold; text-transform: uppercase; text-align: center; }
        #interface-signal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #interface-signal::before { content: ''; position: absolute; top:0; left:0; width: 100%; height: 100%; background: rgba(14,16,21,0.95); backdrop-filter: blur(10px); z-index: -1; pointer-events: none; }
        .content-overlay { position: relative; z-index: 101; text-align: center; width: 100%; padding: 20px; }
        .game-icon-small { width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid #00ffcc; margin: 0 auto 15px auto; }
        .loader { width: 40px; height: 40px; border: 4px solid #00ffcc33; border-top: 4px solid #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-box { background: #1c1f26; padding: 15px; border-radius: 15px; margin: 20px 0; display: none; border: 1px solid #333; }
        .btn-action { margin-top: 10px; padding: 15px 40px; font-size: 16px; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; width: 80%; }
        .btn-signal { background: #00ffcc; color: #0e1015; }
        .btn-retour { background: transparent; border: 1px solid #6d798a; color: #fff; }
        .g164 { background-image: url('IMG_0164.WEBP'); }
        .g165 { background-image: url('IMG_0165.WEBP'); }
        .g166 { background-image: url('IMG_0166.WEBP'); }
        .g167 { background-image: url('IMG_0167.WEBP'); }
        .g168 { background-image: url('IMG_0168.WEBP'); }
        .g170 { background-image: url('IMG_0170.WEBP'); }
        .g171 { background-image: url('IMG_0171.WEBP'); }
        .g172 { background-image: url('IMG_0172.WEBP'); }
        .g173 { background-image: url('IMG_0173.WEBP'); }
    </style>
</head>
<body>
    <div id="main-menu">
        <h1 style="text-align:center; margin-bottom:20px;">PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card g164" onclick="ouvrirJeu('Lucky Jet', 'g164')">Lucky Jet</div>
            <div class="game-card g165" onclick="ouvrirJeu('Rocket Queen', 'g165')">Rocket Queen</div>
            <div class="game-card g166" onclick="ouvrirJeu('1win Crash', 'g166')">1win Crash</div>
            <div class="game-card g167" onclick="ouvrirJeu('Tropicana', 'g167')">Tropicana</div>
            <div class="game-card g168" onclick="ouvrirJeu('Fortune Crash', 'g168')">Fortune Crash</div>
            <div class="game-card g170" onclick="ouvrirJeu('Meta Crash', 'g170')">Meta Crash</div>
            <div class="game-card g171" onclick="ouvrirJeu('Empire Crime', 'g171')">Empire Crime</div>
            <div class="game-card g172" onclick="ouvrirJeu('Astronaut', 'g172')">Astronaut</div>
            <div class="game-card g173" onclick="ouvrirJeu('Aviator', 'g173')">Aviator</div>
        </div>
    </div>

    <div id="interface-signal">
        <div class="content-overlay">
            <div id="game-icon" class="game-icon-small"></div>
            <h2 id="nom-jeu-titre" style="text-transform: uppercase;"></h2>
            <div id="loader" class="loader"></div>
            <div id="resultat-affichage" class="result-box"></div>
            <button class="btn-action btn-signal" id="btn-signal" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
            <button class="btn-action btn-retour" onclick="fermerJeu()">RETOUR</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        let currentGame = { nom: '', classe: '' };

        function ouvrirJeu(nom, classe) {
            currentGame = { nom: nom, classe: classe };
            document.getElementById('main-menu').style.display = 'none';
            const interface = document.getElementById('interface-signal');
            interface.style.display = 'flex';
            interface.className = classe;
            document.getElementById('game-icon').className = 'game-icon-small ' + classe;
            document.getElementById('nom-jeu-titre').innerText = nom;
            document.getElementById('resultat-affichage').style.display = 'none';
            document.getElementById('loader').style.display = 'none';
            document.getElementById('btn-signal').style.display = 'inline-block';
        }

        function fermerJeu() {
            document.getElementById('interface-signal').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }

        function lancerCalcul() {
            document.getElementById('btn-signal').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultat-affichage').style.display = 'none';

            setTimeout(() => {
                const now = new Date();
                const timestamp = now.getTime();
                const intervalSec = (currentGame.nom === 'Lucky Jet') ? 30 : 50;
                const intervalMs = intervalSec * 1000;
                
                const periodStart = Math.floor(timestamp / intervalMs) * intervalMs;
                const periodEnd = periodStart + intervalMs;
                
                const seed = periodStart;
                const seededRandom = (seed * 9301 + 49297) % 233280 / 233280;
                const cote = (seededRandom * (20 - 10) + 10).toFixed(2);
                const fiab = (currentGame.nom === 'Lucky Jet') ? 1.5 : 2.0;
                
                const heureFin = new Date(periodEnd);
                const horaireFormat = heureFin.toLocaleTimeString('fr-FR');

                document.getElementById('resultat-affichage').innerHTML = `
                    <p>Cote cible: <b>${cote}x</b></p>
                    <p>Fiabilité: <b>${fiab}</b></p>
                    <p>Heure fin signal: <b style="color:#00ffcc">${horaireFormat}</b></p>
                `;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('resultat-affichage').style.display = 'block';
                document.getElementById('btn-signal').style.display = 'inline-block';
            }, 1000);
        }
    </script>
</body>
</html>
