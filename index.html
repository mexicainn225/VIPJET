<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0e1015; color: white; font-family: sans-serif; padding: 20px; }
        .result-box { background: #1c1f26; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #333; text-align: center; display: none; }
        .btn-action { padding: 15px 40px; background: #00ffcc; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; }
        .admin-row { display: flex; justify-content: space-between; margin: 10px 0; background: #222; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="interface-signal">
        <h2 id="nom-jeu-titre">JEU</h2>
        <div id="resultat-affichage" class="result-box"></div>
        <button class="btn-action" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
    </div>

    <script>
        // Réglages par défaut
        let configJeux = JSON.parse(localStorage.getItem('configJeux')) || {
            'Lucky Jet': 4, 'Rocket Queen': 3, '1win Crash': 3, 'Tropicana': 5,
            'Fortune Crash': 7, 'Meta Crash': 6, 'Empire Crime': 6, 'Astronaut': 5, 'Aviator': 4
        };
        let currentGame = { nom: 'Lucky Jet' }; // Exemple

        function lancerCalcul() {
            const now = new Date();
            const intervalMin = configJeux[currentGame.nom] || 4;
            // 30s pour Lucky Jet, 50s pour les autres
            const targetSec = (currentGame.nom === 'Lucky Jet') ? 30 : 50;

            // On prend l'heure actuelle
            let signalTime = new Date();
            signalTime.setSeconds(targetSec);
            signalTime.setMilliseconds(0);

            // On trouve la minute actuelle dans le cycle
            const currentMin = signalTime.getMinutes();
            const nextMin = Math.ceil(currentMin / intervalMin) * intervalMin;
            signalTime.setMinutes(nextMin);

            // Si le résultat est trop proche ou passé, on ajoute un cycle
            if (signalTime < now) {
                signalTime.setMinutes(signalTime.getMinutes() + intervalMin);
            }

            const pad = (n) => n.toString().padStart(2, '0');
            const heureF = `${pad(signalTime.getHours())}:${pad(signalTime.getMinutes())}:${pad(signalTime.getSeconds())}`;
            
            // Calcul d'une cote aléatoire cohérente
            const seed = signalTime.getTime();
            const cote = ((seed % 1000 / 100) + 1.2).toFixed(2);
            
            const affichage = document.getElementById('resultat-affichage');
            affichage.innerHTML = `<p>Cote cible: <b>${cote}x</b></p><p>Prochain signal: <b style="color:#00ffcc">${heureF}</b></p>`;
            affichage.style.display = 'block';
        }
    </script>
</body>
</html>
