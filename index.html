<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px; min-height: 100vh; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { border-radius: 14px; aspect-ratio: 1 / 1.4; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 10px; cursor: pointer; background-color: #151822; font-size: 10px; font-weight: bold; text-align: center; }
        #interface-signal, #admin-interface { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0e1015; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn-action { margin-top: 20px; padding: 15px 40px; font-size: 16px; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; background: #00ffcc; color: #0e1015; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #ff3333; color: white; border-radius: 50%; width: 50px; height: 50px; border: none; display: none; z-index: 999; }
        .admin-row { background: #222; padding: 15px; margin: 10px; border-radius: 8px; font-size: 14px; width: 90%; }
    </style>
</head>
<body>
    <div id="main-menu">
        <h1 style="text-align:center; margin-bottom:20px;">PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card" onclick="ouvrirJeu('Lucky Jet')">Lucky Jet</div>
            <div class="game-card" onclick="ouvrirJeu('Aviator')">Aviator</div>
        </div>
    </div>

    <div id="interface-signal">
        <h2 id="nom-jeu-titre"></h2>
        <div id="resultat-affichage" style="margin:20px; font-size:24px; color:#00ffcc;"></div>
        <button class="btn-action" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
        <button class="btn-action" onclick="location.reload()">RETOUR</button>
    </div>

    <div id="admin-interface">
        <h2>PANNEAU ADMIN</h2>
        <div id="admin-list" style="width:100%; height:70vh; overflow-y:auto;"></div>
        <button class="btn-action" onclick="document.getElementById('admin-interface').style.display='none'">FERMER</button>
    </div>

    <button id="btn-admin" class="admin-btn" onclick="ouvrirAdmin()">⚙️</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Vérification de ton ID administrateur
        // Remplace 5724620019 par ton ID réel
        if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id == 5724620019) {
            document.getElementById('btn-admin').style.display = 'block';
        }

        let configJeux = JSON.parse(localStorage.getItem('configJeux')) || {
            'Lucky Jet': {cycle: 4, debut: '00:00'}, 'Aviator': {cycle: 4, debut: '00:00'}
        };

        function ouvrirJeu(nom) {
            currentGame = nom;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'flex';
            document.getElementById('nom-jeu-titre').innerText = nom;
        }

        function lancerCalcul() {
            const ajustement = 60000; // Correction du retard d'une minute
            const now = Date.now() + ajustement;
            const cfg = configJeux[currentGame];
            const [hD, mD] = cfg.debut.split(':').map(Number);
            
            const date = new Date(now);
            const startOfDay = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(), hD, mD, 0);
            
            const diffMs = now - startOfDay;
            const cycleMs = cfg.cycle * 60 * 1000;
            const cyclesEcoules = Math.floor(diffMs / cycleMs);
            
            let debutSignal = new Date(startOfDay + ((cyclesEcoules + 1) * cycleMs));
            
            const seed = Math.floor(debutSignal.getTime() / 60000);
            const random = (seed * 9301 + 49297) % 233280 / 233280;
            const cote = (10 + (random * 10)).toFixed(2);
            
            document.getElementById('resultat-affichage').innerHTML = `Cote : ${cote}x<br><small>Signal : ${debutSignal.getUTCHours()}:${debutSignal.getUTCMinutes()} UTC</small>`;
            document.getElementById('resultat-affichage').style.display = 'block';
        }

        function ouvrirAdmin() {
            document.getElementById('admin-interface').style.display = 'flex';
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            for(let nom in configJeux) {
                list.innerHTML += `<div class="admin-row">${nom}: <input type="number" id="c-${nom}" value="${configJeux[nom].cycle}"> <button onclick="save('${nom}')">OK</button></div>`;
            }
        }

        function save(nom) {
            configJeux[nom].cycle = document.getElementById('c-'+nom).value;
            localStorage.setItem('configJeux', JSON.stringify(configJeux));
            alert("Configuration sauvegardée !");
        }
    </script>
</body>
</html>
