<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px; min-height: 100vh; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { border-radius: 14px; aspect-ratio: 1 / 1.4; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 10px; cursor: pointer; background-size: cover; background-position: center; background-color: #151822; font-size: 10px; font-weight: bold; text-transform: uppercase; text-align: center; }
        .g164 { background-image: url('IMG_0164.WEBP'); } .g165 { background-image: url('IMG_0165.WEBP'); }
        .g166 { background-image: url('IMG_0166.WEBP'); } .g167 { background-image: url('IMG_0167.WEBP'); }
        .g168 { background-image: url('IMG_0168.WEBP'); } .g170 { background-image: url('IMG_0170.WEBP'); }
        .g171 { background-image: url('IMG_0171.WEBP'); } .g172 { background-image: url('IMG_0172.WEBP'); }
        .g173 { background-image: url('IMG_0173.WEBP'); }
        #interface-signal, #admin-interface { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0e1015; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .content-overlay { text-align: center; width: 100%; padding: 20px; }
        .game-icon-small { width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid #00ffcc; margin: 0 auto 15px auto; }
        .result-box { background: #1c1f26; padding: 15px; border-radius: 15px; margin: 20px 0; display: none; border: 1px solid #333; }
        .btn-action { margin-top: 10px; padding: 15px 40px; font-size: 16px; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; width: 80%; }
        .btn-signal { background: #00ffcc; color: #0e1015; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #ff3333; color: white; border-radius: 50%; width: 50px; height: 50px; border: none; display: none; z-index: 99; }
        .admin-row { display: flex; flex-direction: column; width: 95%; margin: 10px 0; background: #222; padding: 10px; border-radius: 8px; font-size: 12px; }
        .admin-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="main-menu">
        <h1 style="text-align:center; margin-bottom:20px;">PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card g164" onclick="ouvrirJeu('Lucky Jet', 'g164')">Lucky Jet</div>
            <div class="game-card g165" onclick="ouvrirJeu('Rocket Queen', 'g165')">Rocket Queen</div>
            <div class="game-card g166" onclick="ouvrirJeu('1win Crash', 'g166')">1win Crash</div>
            <div class="game-card g167" onclick="ouvrirJeu('Tropicana', 'g167')">Tropicana</div>
            <div class="game-card g168" onclick="ouvrirJeu('Fortune Crash', 'g168')">Fortune Crash</div>
            <div class="game-card g170" onclick="ouvrirJeu('Meta Crash', 'g170')">Meta Crash</div>
            <div class="game-card g171" onclick="ouvrirJeu('Empire Crime', 'g171')">Empire Crime</div>
            <div class="game-card g172" onclick="ouvrirJeu('Astronaut', 'g172')">Astronaut</div>
            <div class="game-card g173" onclick="ouvrirJeu('Aviator', 'g173')">Aviator</div>
        </div>
    </div>

    <div id="interface-signal">
        <div class="content-overlay">
            <div id="game-icon" class="game-icon-small"></div>
            <h2 id="nom-jeu-titre"></h2>
            <div id="resultat-affichage" class="result-box"></div>
            <button class="btn-action btn-signal" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
            <button class="btn-action" onclick="fermerJeu()">RETOUR</button>
        </div>
    </div>

    <div id="admin-interface">
        <h2>PANNEAU ADMIN</h2>
        <div id="admin-list" style="width:100%; height: 70vh; overflow-y: auto;"></div>
        <button class="btn-action" onclick="document.getElementById('admin-interface').style.display='none'">FERMER</button>
    </div>

    <button id="admin-panel-btn" class="admin-btn" onclick="ouvrirAdmin()">⚙️</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        if(tg.initDataUnsafe.user && tg.initDataUnsafe.user.id == 5724620019) {
            document.getElementById('admin-panel-btn').style.display = 'block';
        }

        let configJeux = JSON.parse(localStorage.getItem('configJeux')) || {
            'Lucky Jet': {cycle: 4, debut: '00:00'}, 'Rocket Queen': {cycle: 3, debut: '00:00'},
            '1win Crash': {cycle: 3, debut: '00:00'}, 'Tropicana': {cycle: 5, debut: '00:00'},
            'Fortune Crash': {cycle: 7, debut: '00:00'}, 'Meta Crash': {cycle: 6, debut: '00:00'},
            'Empire Crime': {cycle: 6, debut: '00:00'}, 'Astronaut': {cycle: 5, debut: '00:00'}, 'Aviator': {cycle: 4, debut: '00:00'}
        };

        let currentGame = { nom: '', classe: '' };

        function ouvrirJeu(nom, classe) {
            currentGame = { nom, classe };
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'flex';
            document.getElementById('game-icon').className = 'game-icon-small ' + classe;
            document.getElementById('nom-jeu-titre').innerText = nom;
            document.getElementById('resultat-affichage').style.display = 'none';
        }

        async function lancerCalcul() {
            // Récupération de l'heure mondiale réelle (Synchronisation serveur)
            const response = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
            const data = await response.json();
            const now = new Date(data.datetime).getTime();
            
            const cfg = configJeux[currentGame.nom];
            const [hD, mD] = cfg.debut.split(':').map(Number);
            
            // Calcul du début de cycle UTC
            const date = new Date(now);
            const startOfDay = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(), hD, mD, 0);
            
            const cycleMs = cfg.cycle * 60 * 1000;
            const targetSec = (currentGame.nom === 'Lucky Jet') ? 30 : 50;

            const diffMs = now - startOfDay;
            let cyclesEcoules = Math.floor(diffMs / cycleMs);
            if (diffMs < 0) cyclesEcoules = -1;
            
            let debutSignal = new Date(startOfDay + ((cyclesEcoules + 1) * cycleMs));
            debutSignal.setUTCSeconds(targetSec);

            // Seed basée sur la minute UTC mondiale
            const seed = Math.floor(debutSignal.getTime() / 60000);
            const random = (seed * 9301 + 49297) % 233280 / 233280;
            
            let cote = (10 + (random * 10)).toFixed(2);
            let fiabiliteFixe = (currentGame.nom === 'Lucky Jet') ? 1.5 : 2.0;
            
            const pad = (n) => n.toString().padStart(2, '0');
            const hF = `${pad(debutSignal.getUTCHours())}:${pad(debutSignal.getUTCMinutes())}:${pad(debutSignal.getUTCSeconds())}`;
            
            const affichage = document.getElementById('resultat-affichage');
            affichage.innerHTML = `
                <div style="margin-bottom:5px;">Cote cible</div>
                <div style="font-size:32px; font-weight:bold; color:#00ffcc; margin-bottom:10px;">${cote}x</div>
                <div style="border-top:1px solid #444; padding-top:10px;">
                    <p style="font-size:12px; color:#aaa;">Début du signal: <b>${hF} UTC</b></p>
                    <p style="font-size:16px; margin-top:5px; color:#ffffff;">Fiabilité: <b style="color:#ffcc00;">${fiabiliteFixe}</b></p>
                </div>`;
            affichage.style.display = 'block';
        }

        function ouvrirAdmin() {
            document.getElementById('admin-interface').style.display = 'flex';
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            for(let nom in configJeux) {
                list.innerHTML += `
                <div class="admin-row">
                    <span style="font-weight:bold;">${nom}</span>
                    <div class="admin-controls">
                        <input type="number" id="cyc-${nom.replace(/\s/g,'')}" value="${configJeux[nom].cycle}" style="width:40px"> min
                        <input type="time" id="deb-${nom.replace(/\s/g,'')}" value="${configJeux[nom].debut}" style="width:80px">
                        <button onclick="saveAdmin('${nom}')">OK</button>
                    </div>
                </div>`;
            }
        }

        function saveAdmin(nom) {
            const key = nom.replace(/\s/g, '');
            configJeux[nom] = {
                cycle: parseInt(document.getElementById('cyc-'+key).value),
                debut: document.getElementById('deb-'+key).value
            };
            localStorage.setItem('configJeux', JSON.stringify(configJeux));
            alert("Réglages mis à jour pour " + nom);
        }

        function fermerJeu() { location.reload(); }
    </script>
</body>
</html>
