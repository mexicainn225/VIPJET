<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px; min-height: 100vh; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { border-radius: 14px; aspect-ratio: 1 / 1.4; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 10px; cursor: pointer; background-size: cover; background-position: center; background-color: #151822; font-size: 10px; font-weight: bold; text-transform: uppercase; text-align: center; }
        #interface-signal, #admin-interface { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0e1015; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .content-overlay { text-align: center; width: 100%; padding: 20px; }
        .game-icon-small { width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid #00ffcc; margin: 0 auto 15px auto; }
        .result-box { background: #1c1f26; padding: 15px; border-radius: 15px; margin: 20px 0; display: none; border: 1px solid #333; }
        .btn-action { margin-top: 10px; padding: 15px 40px; font-size: 16px; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; width: 80%; }
        .btn-signal { background: #00ffcc; color: #0e1015; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #ff3333; color: white; border-radius: 50%; width: 50px; height: 50px; border: none; display: none; z-index: 99; }
        .admin-row { display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 10px 0; background: #222; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="main-menu">
        <h1 style="text-align:center; margin-bottom:20px;">PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card" onclick="ouvrirJeu('Lucky Jet', 'g164')">Lucky Jet</div>
            <div class="game-card" onclick="ouvrirJeu('Rocket Queen', 'g165')">Rocket Queen</div>
            <div class="game-card" onclick="ouvrirJeu('1win Crash', 'g166')">1win Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Tropicana', 'g167')">Tropicana</div>
            <div class="game-card" onclick="ouvrirJeu('Fortune Crash', 'g168')">Fortune Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Meta Crash', 'g170')">Meta Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Empire Crime', 'g171')">Empire Crime</div>
            <div class="game-card" onclick="ouvrirJeu('Astronaut', 'g172')">Astronaut</div>
            <div class="game-card" onclick="ouvrirJeu('Aviator', 'g173')">Aviator</div>
        </div>
    </div>

    <div id="interface-signal">
        <div class="content-overlay">
            <div id="game-icon" class="game-icon-small"></div>
            <h2 id="nom-jeu-titre"></h2>
            <div id="resultat-affichage" class="result-box"></div>
            <button class="btn-action btn-signal" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
            <button class="btn-action" onclick="fermerJeu()">RETOUR</button>
        </div>
    </div>

    <div id="admin-interface">
        <h2>PANNEAU ADMIN</h2>
        <div class="admin-row">
            <span>Décalage (min):</span>
            <input type="number" id="timeOffset" value="0" style="width:50px;">
            <button onclick="saveOffset()">SAVE</button>
        </div>
        <div id="admin-list" style="width:100%;"></div>
        <button class="btn-action" onclick="document.getElementById('admin-interface').style.display='none'">FERMER</button>
    </div>

    <button id="admin-panel-btn" class="admin-btn" onclick="ouvrirAdmin()">⚙️</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        let configJeux = JSON.parse(localStorage.getItem('configJeux')) || {
            'Lucky Jet': 4, 'Rocket Queen': 4, '1win Crash': 4, 'Tropicana': 4,
            'Fortune Crash': 4, 'Meta Crash': 4, 'Empire Crime': 4, 'Astronaut': 4, 'Aviator': 4
        };

        if(tg.initDataUnsafe.user && tg.initDataUnsafe.user.id == 5724620019) {
            document.getElementById('admin-panel-btn').style.display = 'block';
        }

        let currentGame = { nom: '', classe: '' };

        function ouvrirJeu(nom, classe) {
            currentGame = { nom, classe };
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'flex';
            document.getElementById('nom-jeu-titre').innerText = nom;
            document.getElementById('resultat-affichage').style.display = 'none';
        }

        function saveOffset() {
            localStorage.setItem('timeOffset', document.getElementById('timeOffset').value);
            alert("Décalage enregistré.");
        }

        function lancerCalcul() {
            const offsetMin = parseInt(localStorage.getItem('timeOffset')) || 0;
            const now = new Date(new Date().getTime() + (offsetMin * 60000));
            
            const intervalMin = configJeux[currentGame.nom] || 4;
            const targetSec = (currentGame.nom === 'Lucky Jet') ? 30 : 50;

            let debutSignal = new Date(now);
            debutSignal.setSeconds(targetSec);
            debutSignal.setMilliseconds(0);
            
            const minutes = debutSignal.getMinutes();
            debutSignal.setMinutes(Math.floor(minutes / intervalMin) * intervalMin);

            if (debutSignal.getTime() > now.getTime()) {
                debutSignal.setMinutes(debutSignal.getMinutes() - intervalMin);
            }

            const heureDebut = debutSignal.toLocaleTimeString('fr-FR', {
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });

            const seed = debutSignal.getTime() + (currentGame.nom.length * 9999);
            const seededRandom = (seed * 9301 + 49297) % 233280 / 233280;
            const cote = (seededRandom * (20 - 10) + 10).toFixed(2);
            
            document.getElementById('resultat-affichage').innerHTML = `
                <p>Cote cible: <b>${cote}x</b></p>
                <p>Début du signal: <b style="color:#00ffcc">${heureDebut}</b></p>`;
            document.getElementById('resultat-affichage').style.display = 'block';
        }

        function ouvrirAdmin() {
            document.getElementById('admin-interface').style.display = 'flex';
            document.getElementById('timeOffset').value = localStorage.getItem('timeOffset') || 0;
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            for(let nom in configJeux) {
                list.innerHTML += `<div class="admin-row"><span>${nom}</span><input type="number" id="inp-${nom.replace(/\s/g,'')}" value="${configJeux[nom]}">min <button onclick="saveAdmin('${nom}')">OK</button></div>`;
            }
        }

        function saveAdmin(nom) {
            const val = document.getElementById('inp-'+nom.replace(/\s/g, '')).value;
            configJeux[nom] = parseInt(val);
            localStorage.setItem('configJeux', JSON.stringify(configJeux));
            alert("Intervalle pour " + nom + " fixé à " + val + " min.");
        }

        function fermerJeu() { location.reload(); }
    </script>
</body>
</html>
