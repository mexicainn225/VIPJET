<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0e1015; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* Conteneur de l'animation */
        #container { position: relative; width: 250px; height: 250px; display: none; }
        #game-img { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #00ffcc; animation: rotation 4s infinite linear; }
        #score { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 10px black; }
        
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .btn { padding: 15px 30px; font-size: 20px; background: #00ffcc; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; }
        .card { background: #1c1f26; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menu" class="grid">
        <div class="card" onclick="lancerAnim('IMG_0164.WEBP', 'Lucky Jet')">Lucky Jet</div>
        <div class="card" onclick="lancerAnim('IMG_0173.WEBP', 'Aviator')">Aviator</div>
        </div>

    <div id="container">
        <img id="game-img" src="">
        <div id="score">--.--x</div>
    </div>
    <button id="btn-signal" class="btn" style="display:none" onclick="genererSignal()">SIGNAL</button>

    <script>
        const tg = window.Telegram.WebApp;
        let jeuActuel = "";

        function lancerAnim(imgSrc, nomJeu) {
            jeuActuel = nomJeu;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-img').src = imgSrc;
            document.getElementById('container').style.display = 'block';
            document.getElementById('btn-signal').style.display = 'block';
        }

        function genererSignal() {
            document.getElementById('score').innerText = "..."
            // Envoi au bot
            tg.sendData(jeuActuel);
            // Simulation visuelle locale
            setTimeout(() => { document.getElementById('score').innerText = "3.41x"; }, 1500);
        }
    </script>
</body>
</html>
