<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px 12px; }
        .header { text-align: center; margin-bottom: 20px; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .game-card { border-radius: 14px; aspect-ratio: 1 / 1.45; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 12px; cursor: pointer; background-size: cover; background-position: center; background-color: #151822; }
        .game-title { font-size: 11px; font-weight: 800; text-transform: uppercase; z-index: 2; }
        
        .g164 { background-image: url('IMG_0164.WEBP'); }
        .g165 { background-image: url('IMG_0165.WEBP'); }
        .g166 { background-image: url('IMG_0166.WEBP'); }
        .g167 { background-image: url('IMG_0167.WEBP'); }
        .g168 { background-image: url('IMG_0168.WEBP'); }
        .g170 { background-image: url('IMG_0170.WEBP'); }
        .g171 { background-image: url('IMG_0171.WEBP'); }
        .g172 { background-image: url('IMG_0172.WEBP'); }
        .g173 { background-image: url('IMG_0173.WEBP'); }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header"><h1>PLATEFORME DE SIGNAUX VIP</h1></div>
        <div class="games-grid">
            <div class="game-card g164" onclick="envoyerSignal('Lucky Jet')"><div class="game-title">Lucky Jet</div></div>
            <div class="game-card g165" onclick="envoyerSignal('Rocket Queen')"><div class="game-title">Rocket Queen</div></div>
            <div class="game-card g166" onclick="envoyerSignal('1win Crash')"><div class="game-title">1win Crash</div></div>
            <div class="game-card g167" onclick="envoyerSignal('Tropicana')"><div class="game-title">Tropicana</div></div>
            <div class="game-card g168" onclick="envoyerSignal('Fortune Crash')"><div class="game-title">Fortune Crash</div></div>
            <div class="game-card g170" onclick="envoyerSignal('Meta Crash')"><div class="game-title">Meta Crash</div></div>
            <div class="game-card g171" onclick="envoyerSignal('Empire Crime')"><div class="game-title">Empire Crime</div></div>
            <div class="game-card g172" onclick="envoyerSignal('Astronaut')"><div class="game-title">Astronaut</div></div>
            <div class="game-card g173" onclick="envoyerSignal('Aviator')"><div class="game-title">Aviator</div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        function envoyerSignal(nomJeu) {
            tg.sendData(nomJeu); 
            tg.close();
        }
    </script>
</body>
</html>
