<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px; min-height: 100vh; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { border-radius: 14px; aspect-ratio: 1 / 1.4; display: flex; align-items: center; justify-content: center; cursor: pointer; background-size: cover; background-color: #151822; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        #interface-signal, #admin-interface { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(14,16,21,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; }
        .btn-action { padding: 15px 30px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; margin: 10px; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #ff3333; color: white; border-radius: 50%; width: 50px; height: 50px; border: none; display: none; }
        .admin-row { display: flex; justify-content: space-between; width: 100%; margin: 10px 0; background: #222; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="text-align:center; margin-bottom:20px;">PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card" onclick="ouvrirJeu('Lucky Jet', 1.5)">Lucky Jet</div>
            <div class="game-card" onclick="ouvrirJeu('Aviator', 2.0)">Aviator</div>
            <div class="game-card" onclick="ouvrirJeu('Tropicana', 1.5)">Tropicana</div>
        </div>
    </div>

    <div id="interface-signal">
        <h2 id="nom-jeu-titre"></h2>
        <div id="resultat-affichage" style="margin:20px 0; text-align:center; font-size: 18px;"></div>
        <button class="btn-action" style="background:#00ffcc" id="btn-signal" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
        <button class="btn-action" style="background:transparent; border:1px solid #6d798a; color:#fff" onclick="fermerJeu()">RETOUR</button>
    </div>

    <div id="admin-interface">
        <h2>PANNEAU ADMIN</h2>
        <div id="admin-list" style="width:100%; margin: 20px 0;"></div>
        <button class="btn-action" style="background:#ff3333; color:white" onclick="document.getElementById('admin-interface').style.display='none'">FERMER</button>
    </div>

    <button id="admin-panel-btn" class="admin-btn" onclick="ouvrirAdmin()">⚙️</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Stockage des intervalles (sauvegardés dans le navigateur)
        let configJeux = JSON.parse(localStorage.getItem('configJeux')) || {
            'Lucky Jet': 4, 'Aviator': 4, 'Tropicana': 5
        };

        if(tg.initDataUnsafe.user && tg.initDataUnsafe.user.id == 5724620019) {
            document.getElementById('admin-panel-btn').style.display = 'block';
        }

        let currentGame = { nom: '', fiab: 0 };

        function ouvrirJeu(nom, fiab) {
            currentGame = { nom, fiab };
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'flex';
            document.getElementById('nom-jeu-titre').innerText = nom;
            document.getElementById('resultat-affichage').innerHTML = "Prêt à générer...";
        }

        function fermerJeu() {
            document.getElementById('interface-signal').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }

        function lancerCalcul() {
            const m = new Date().getMinutes();
            const interval = configJeux[currentGame.nom];
            const nextM = m + (interval - (m % interval));
            const heureCible = new Date();
            heureCible.setMinutes(nextM);
            heureCible.setSeconds(0);

            document.getElementById('resultat-affichage').innerHTML = `
                Cote: ${(Math.random()*(20-10)+10).toFixed(2)}x<br>
                Fiabilité: ${currentGame.fiab}<br>
                <b>Prochain signal: ${heureCible.toLocaleTimeString()}</b>
            `;
        }

        function ouvrirAdmin() {
            document.getElementById('admin-interface').style.display = 'flex';
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            for(let nom in configJeux) {
                list.innerHTML += `
                    <div class="admin-row">
                        <span>${nom}</span>
                        <input type="number" id="inp-${nom}" value="${configJeux[nom]}" style="width:50px">
                        <button onclick="saveAdmin('${nom}')">OK</button>
                    </div>`;
            }
        }

        function saveAdmin(nom) {
            const val = document.getElementById('inp-'+nom).value;
            configJeux[nom] = parseInt(val);
            localStorage.setItem('configJeux', JSON.stringify(configJeux));
            alert(nom + " réglé sur " + val + " minutes.");
        }
    </script>
</body>
</html>
