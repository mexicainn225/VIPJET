<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0e1015; color: #ffffff; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 400px; }
        .game-card { background-color: #151822; padding: 20px 10px; border-radius: 14px; text-align: center; cursor: pointer; font-size: 12px; font-weight: bold; border: 1px solid #222; }
        #interface-signal { display: none; text-align: center; width: 100%; }
        .btn-action { margin-top: 20px; padding: 15px 40px; background: #00ffcc; color: #0e1015; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; font-size: 28px; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu" style="width: 100%; max-width: 400px;">
        <h1 style="text-align:center; margin-bottom:30px;">PLATEFORME VIP</h1>
        <div class="games-grid" id="grid"></div>
    </div>

    <div id="interface-signal">
        <h2 id="nom-jeu-titre" style="margin-bottom: 20px;"></h2>
        <div class="result" id="resultat-affichage">--x</div>
        <button class="btn-action" onclick="calculerSignal()">DEMANDER SIGNAL</button>
        <button class="btn-action" style="background:#444; color:white;" onclick="location.reload()">RETOUR</button>
    </div>

    <script>
        // RÉGLAGES CENTRAUX (Modifie ici pour changer les jeux)
        const configs = {
            'Lucky Jet': { cycle: 4, debut: '00:00' },
            'Aviator': { cycle: 4, debut: '00:00' },
            'Rocket Queen': { cycle: 5, debut: '00:00' },
            'JetX': { cycle: 3, debut: '00:00' },
            'Balloon': { cycle: 4, debut: '00:00' },
            'Dice': { cycle: 4, debut: '00:00' },
            'Mines': { cycle: 4, debut: '00:00' },
            'Plinko': { cycle: 4, debut: '00:00' },
            'Zeppelin': { cycle: 4, debut: '00:00' }
        };

        let currentGame = "";

        // Création automatique des boutons de jeux
        const grid = document.getElementById('grid');
        for (let game in configs) {
            grid.innerHTML += `<div class="game-card" onclick="ouvrirJeu('${game}')">${game}</div>`;
        }

        function ouvrirJeu(nom) {
            currentGame = nom;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'block';
            document.getElementById('nom-jeu-titre').innerText = nom;
        }

        function calculerSignal() {
            const cfg = configs[currentGame];
            const now = Date.now();
            const [hD, mD] = cfg.debut.split(':').map(Number);
            
            const date = new Date(now);
            const startOfDay = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(), hD, mD, 0);
            
            const diffMs = now - startOfDay;
            const cycleMs = cfg.cycle * 60 * 1000;
            const cyclesEcoules = Math.floor(diffMs / cycleMs);
            
            let debutSignal = new Date(startOfDay + ((cyclesEcoules + 1) * cycleMs));
            
            // Calcul aléatoire basé sur le temps (identique pour tous)
            const seed = Math.floor(debutSignal.getTime() / 60000);
            const random = (seed * 9301 + 49297) % 233280 / 233280;
            const cote = (10 + (random * 10)).toFixed(2);
            
            document.getElementById('resultat-affichage').innerText = cote + "x";
        }
    </script>
</body>
</html>
